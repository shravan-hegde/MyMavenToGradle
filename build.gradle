apply plugin: 'java'
apply plugin: 'application'

group = 'com.example'
version = '1.0-SNAPSHOT'
description = "MyMavenToGradle"

sourceCompatibility = 1.8
targetCompatibility = 1.8

mainClassName = 'com.example.App'

repositories {
    mavenCentral()
}

dependencies {
    testCompile 'junit:junit:4.12'
}
